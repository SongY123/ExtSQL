services:
  postgres:
    build:
      context: .
      args:
        PG_SEARCH_VERSION: "0.24.1"
        PG_JSONSCHEMA_VERSION: "0.3.4"
    image: extsql-postgres:18.4
    container_name: extsql-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb,pg_search
      - -c
      - timescaledb.telemetry_level=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:

